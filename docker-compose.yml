services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "30MB"

  api1:
    build: .
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    build: .
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
